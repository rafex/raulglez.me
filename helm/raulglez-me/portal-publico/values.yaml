# ─── Values para portal-publico (frontend CV + Chat) ───
replicaCount: 1

image:
  repository: ghcr.io/rafex/raulglez-portal-publico
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "raulglez-portal-publico"

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

# nginx corre como uid 101 (grupo www-data)
podSecurityContext:
  fsGroup: 101

securityContext:
  runAsNonRoot: true
  readOnlyRootFilesystem: false
  runAsUser: 101
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]

service:
  type: ClusterIP
  port: 80

deployment:
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 1, maxSurge: 1 }
  progressDeadlineSeconds: 300

# Sin secreto de entorno (nginx no necesita vars de app)
env:
  secretName: ""

# Sin volumen de datos (nginx solo sirve estáticos)
dataVolume:
  mountPath: ""
  emptyDir: {}

ingress:
  enabled: false
  className: "haproxy"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: raulglez.me
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: raulglez-me-tls
      hosts:
        - raulglez.me

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

livenessProbe:
  httpGet: { path: /, port: http }
  initialDelaySeconds: 5
  periodSeconds: 30

readinessProbe:
  httpGet: { path: /, port: http }
  initialDelaySeconds: 3
  periodSeconds: 10

startupProbe:
  httpGet: { path: /, port: http }
  failureThreshold: 10
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: false

nodeSelector: {}
tolerations: []
affinity: {}
