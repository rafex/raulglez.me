# ─── Default values for raulglez-me ───
# El chart se usa con --set para desplegar cada servicio por separado.

replicaCount: 1

image:
  repository: ghcr.io/rafex/raulglez.me
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: { fsGroup: 1001 }
securityContext:
  capabilities: { drop: [ALL] }
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1001

service:
  type: ClusterIP
  port: 80

deployment:
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 1, maxSurge: 1 }
  progressDeadlineSeconds: 900

env:
  secretName: raulglez-me-env
  aiServiceUrl: http://raulglez-ai:3001

dataVolume:
  emptyDir: {}

ingress:
  enabled: true
  className: "haproxy"
  annotations: {}
  hosts:
    - host: raulglez.me
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:   { cpu: 1000m, memory: 1Gi }
  requests: { cpu: 100m, memory: 256Mi }

livenessProbe:
  httpGet: { path: /, port: http }
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet: { path: /, port: http }
  initialDelaySeconds: 5
  periodSeconds: 10

startupProbe:
  httpGet: { path: /, port: http }
  failureThreshold: 30
  periodSeconds: 10

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

nodeSelector: {}
tolerations: []
affinity: {}
