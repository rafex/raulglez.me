# ─── Values para backend-portal (API Node.js) ───
replicaCount: 1

image:
  repository: ghcr.io/rafex/raulglez-backend-portal
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "raulglez-backend-portal"

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  runAsNonRoot: true
  readOnlyRootFilesystem: false
  runAsUser: 1001
  capabilities:
    drop: [ALL]

service:
  type: ClusterIP
  port: 3000

deployment:
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 1, maxSurge: 1 }
  progressDeadlineSeconds: 300

env:
  secretName: raulglez-me-env

# backend-portal no usa SQLite — sin volumen de datos
dataVolume:
  mountPath: ""
  emptyDir: {}

ingress:
  enabled: false
  className: "haproxy"
  annotations: {}
  hosts: []
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet: { path: /health, port: http }
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet: { path: /health, port: http }
  initialDelaySeconds: 5
  periodSeconds: 10

startupProbe:
  httpGet: { path: /health, port: http }
  failureThreshold: 30
  periodSeconds: 5

# IMPORTANTE: sesiones en memoria → no escalar horizontalmente hasta migrar a SQLite/Redis
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: false

nodeSelector: {}
tolerations: []
affinity: {}
