{{- if .Values.dataVolume.persistentVolumeClaim.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "backend-portal.fullname" . }}-data
  labels:
    {{- include "backend-portal.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.dataVolume.persistentVolumeClaim.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.dataVolume.persistentVolumeClaim.size }}
  {{- if .Values.dataVolume.persistentVolumeClaim.storageClassName }}
  storageClassName: {{ .Values.dataVolume.persistentVolumeClaim.storageClassName }}
  {{- end }}
{{- end }}
