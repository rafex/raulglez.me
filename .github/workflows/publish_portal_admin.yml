name: Publish Portal Admin

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: publish-portal-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Build portal-admin
        run: |
          cd frontend/portal-admin
          npm ci
          npm run pug
          npx vite build
          sed -i 's|src="/assets/|src="/admin/assets/|g' dist/index.html
          sed -i 's|href="/assets/|href="/admin/assets/|g' dist/index.html
          echo "=== Verifying admin base path ==="
          grep -c '/admin/assets/' dist/index.html

      - name: Set image tags
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/raulglez-portal-admin"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tags=${IMAGE}:${{ github.ref_name }},${IMAGE}:latest" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "tags=${IMAGE}:latest" >> $GITHUB_OUTPUT
          else
            echo "tags=${IMAGE}:${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile.portal-admin
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
