name: Publish Backend

on:
  push:
    branches: [main]
    paths:
      - backend/src/**
      - '!backend/src/ai.ts'
      - backend/data/**
      - backend/package.json
      - backend/package-lock.json
      - backend/tsconfig.json
      - containers/Dockerfile.backend
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        id: meta
        run: echo "image=ghcr.io/${{ github.repository_owner }}/raulglez-backend:${{ github.ref_name == 'main' && 'latest' || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.image }}
