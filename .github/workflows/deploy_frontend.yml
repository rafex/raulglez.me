name: Deploy Portal Publico

on:
  workflow_run:
    workflows: ["Publish Portal Publico"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Container tag'
        required: true
        type: string
        default: 'latest'

concurrency:
  group: deploy-portal-publico
  cancel-in-progress: false

env:
  K3S_NAMESPACE: mvps

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        id: tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
            if [ -z "$HEAD_BRANCH" ] || [ "$HEAD_BRANCH" = "main" ]; then
              echo "tag=latest" >> "$GITHUB_OUTPUT"
            else
              # Para tags (e.g. v1.20260506-1) el publish ya subió esa imagen
              echo "tag=${HEAD_BRANCH}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: azure/setup-kubectl@v4
        with: { version: 'latest' }
      - uses: azure/setup-helm@v4
        with: { version: 'latest' }

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          if echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d >/tmp/kubeconfig.decoded 2>/dev/null; then
            cp /tmp/kubeconfig.decoded "$HOME/.kube/config"
          else
            printf '%s' "${{ secrets.KUBE_CONFIG_DATA }}" > "$HOME/.kube/config"
          fi
          chmod 600 $HOME/.kube/config

      - name: Deploy Portal Publico (frontend CV + Chat)
        run: |
          helm upgrade --install raulglez-portal-publico helm/raulglez-me/portal-publico \
            --namespace "${{ env.K3S_NAMESPACE }}" \
            --create-namespace \
            --set image.repository=ghcr.io/${{ github.repository_owner }}/raulglez-portal-publico \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --set podAnnotations."kubectl\.kubernetes\.io/restartedAt"="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --wait --timeout 2m
