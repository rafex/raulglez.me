name: Deploy Backend

on:
  workflow_run:
    workflows: ["Publish Backend"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Container tag'
        required: true
        type: string
        default: 'latest'

env:
  K3S_NAMESPACE: default
  APP_ENV_SECRET: raulglez-me-env

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        id: tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            [ "$BRANCH" = "main" ] && echo "tag=latest" >> "$GITHUB_OUTPUT" || echo "tag=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: azure/setup-kubectl@v4
        with: { version: 'latest' }
      - uses: azure/setup-helm@v4
        with: { version: 'latest' }

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          if echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d >/tmp/kubeconfig.decoded 2>/dev/null; then
            cp /tmp/kubeconfig.decoded "$HOME/.kube/config"
          else
            printf '%s' "${{ secrets.KUBE_CONFIG_DATA }}" > "$HOME/.kube/config"
          fi
          chmod 600 $HOME/.kube/config

      - name: Create app env secret
        run: |
          GROQ_MODEL_VALUE="${{ vars.GROQ_MODEL }}"
          [ -z "$GROQ_MODEL_VALUE" ] && GROQ_MODEL_VALUE="openai/gpt-oss-20b"
          kubectl create secret generic "${{ env.APP_ENV_SECRET }}" \
            --from-literal=GROQ_API_KEY='${{ secrets.GROQ_API_KEY }}' \
            --from-literal=GROQ_MODEL="$GROQ_MODEL_VALUE" \
            --from-literal=AI_SERVICE_URL=http://raulglez-ai:3000 \
            --from-literal=AI_PORT=3000 \
            --from-literal=ADMIN_USER='${{ secrets.ADMIN_USER }}' \
            --from-literal=ADMIN_PASSWORD='${{ secrets.ADMIN_PASSWORD }}' \
            --from-literal=SESSION_SECRET='${{ secrets.SESSION_SECRET }}' \
            --from-literal=COOKIE_SECURE='true' \
            --namespace="${{ env.K3S_NAMESPACE }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Backend
        run: |
          helm upgrade --install raulglez-backend helm/raulglez-me \
            --namespace "${{ env.K3S_NAMESPACE }}" \
            --set fullnameOverride=raulglez-backend \
            --set image.repository=ghcr.io/${{ github.repository_owner }}/raulglez-backend \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --set service.port=3000 \
            --set env.secretName="${{ env.APP_ENV_SECRET }}" \
            --set resources.limits.cpu=500m \
            --set resources.limits.memory=512Mi \
            --set resources.requests.cpu=100m \
            --set resources.requests.memory=128Mi \
            --set autoscaling.enabled=true \
            --set autoscaling.maxReplicas=3 \
            --set pdb.enabled=true \
            --set pdb.minAvailable=1 \
            --set ingress.enabled=false \
            --wait --timeout 2m
