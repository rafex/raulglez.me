name: Deploy

on:
  push:
    tags:
      - 'v*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Container tag to deploy (e.g. v1.20260501)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - production
        default: production

env:
  HELM_RELEASE: raulglez-me
  HELM_CHART: helm/raulglez-me
  K3S_NAMESPACE: default
  GHCR_PULL_SECRET: ghcr-pull-secret
  APP_ENV_SECRET: raulglez-me-env

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag
        id: tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          if echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d >/tmp/kubeconfig.decoded 2>/dev/null; then
            cp /tmp/kubeconfig.decoded "$HOME/.kube/config"
          else
            printf '%s' "${{ secrets.KUBE_CONFIG_DATA }}" > "$HOME/.kube/config"
          fi
          chmod 600 $HOME/.kube/config

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Ensure namespace exists
        run: |
          kubectl get namespace "${{ env.K3S_NAMESPACE }}" >/dev/null 2>&1 || kubectl create namespace "${{ env.K3S_NAMESPACE }}"

      - name: Create GHCR pull secret
        run: |
          if [ -z "${{ secrets.GHCR_USERNAME }}" ] || [ -z "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "GHCR secrets not configured — skipping pull secret (image is public)"
            exit 0
          fi
          kubectl create secret docker-registry "${{ env.GHCR_PULL_SECRET }}" \
            --docker-server=ghcr.io \
            --docker-username=${{ secrets.GHCR_USERNAME }} \
            --docker-password=${{ secrets.GHCR_TOKEN }} \
            --namespace="${{ env.K3S_NAMESPACE }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create app env secret
        run: |
          GROQ_MODEL_VALUE="${{ vars.GROQ_MODEL }}"
          if [ -z "$GROQ_MODEL_VALUE" ]; then
            GROQ_MODEL_VALUE="llama-3.3-70b-versatile"
          fi

          kubectl create secret generic "${{ env.APP_ENV_SECRET }}" \
            --from-literal=GROQ_API_KEY='${{ secrets.GROQ_API_KEY }}' \
            --from-literal=GROQ_MODEL="$GROQ_MODEL_VALUE" \
            --namespace="${{ env.K3S_NAMESPACE }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm lint
        run: helm lint "${{ env.HELM_CHART }}"

      - name: Helm template
        run: helm template "${{ env.HELM_RELEASE }}" "${{ env.HELM_CHART }}" >/tmp/helm-render.yaml

      - name: Deploy with Helm
        run: |
          HELM_EXTRA=""
          if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
            HELM_EXTRA="--set imagePullSecrets[0].name=${{ env.GHCR_PULL_SECRET }}"
          fi
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART }} \
            --namespace "${{ env.K3S_NAMESPACE }}" \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            $HELM_EXTRA \
            --set env.secretName="${{ env.APP_ENV_SECRET }}" \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl -n "${{ env.K3S_NAMESPACE }}" rollout status deployment/${{ env.HELM_RELEASE }} --timeout=3m
          kubectl -n "${{ env.K3S_NAMESPACE }}" get pods -l app.kubernetes.io/instance=${{ env.HELM_RELEASE }}

      - name: Debug rollout failure
        if: failure()
        run: |
          kubectl -n "${{ env.K3S_NAMESPACE }}" get deploy,rs,pods -o wide
          kubectl -n "${{ env.K3S_NAMESPACE }}" describe deployment "${{ env.HELM_RELEASE }}" || true
          kubectl -n "${{ env.K3S_NAMESPACE }}" get events --sort-by=.metadata.creationTimestamp | tail -n 80 || true
          PODS=$(kubectl -n "${{ env.K3S_NAMESPACE }}" get pods -l app.kubernetes.io/instance="${{ env.HELM_RELEASE }}" -o jsonpath='{.items[*].metadata.name}')
          for p in $PODS; do
            echo "==== describe $p ===="
            kubectl -n "${{ env.K3S_NAMESPACE }}" describe pod "$p" || true
            echo "==== logs $p ===="
            kubectl -n "${{ env.K3S_NAMESPACE }}" logs "$p" --tail=200 || true
            echo "==== previous logs $p ===="
            kubectl -n "${{ env.K3S_NAMESPACE }}" logs "$p" --previous --tail=200 || true
          done
