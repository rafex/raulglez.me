name: Deploy AI

on:
  workflow_run:
    workflows: ["Publish AI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Container tag'
        required: true
        type: string
        default: 'latest'

env:
  K3S_NAMESPACE: default
  APP_ENV_SECRET: raulglez-me-env

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        id: tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            [ "$BRANCH" = "main" ] && echo "tag=latest" >> "$GITHUB_OUTPUT" || echo "tag=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: azure/setup-kubectl@v4
        with: { version: 'latest' }
      - uses: azure/setup-helm@v4
        with: { version: 'latest' }

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          printf '%s' "${{ secrets.KUBE_CONFIG_DATA }}" > "$HOME/.kube/config"
          chmod 600 $HOME/.kube/config

      - name: Deploy AI
        run: |
          helm upgrade --install raulglez-ai helm/raulglez-me \
            --namespace "${{ env.K3S_NAMESPACE }}" \
            --set fullnameOverride=raulglez-ai \
            --set image.repository=ghcr.io/${{ github.repository_owner }}/raulglez-ai \
            --set image.tag=${{ steps.tag.outputs.tag }} \
            --set service.port=3000 \
            --set env.secretName="${{ env.APP_ENV_SECRET }}" \
            --set resources.limits.cpu=1000m \
            --set resources.limits.memory=2Gi \
            --set resources.requests.cpu=100m \
            --set resources.requests.memory=512Mi \
            --set autoscaling.enabled=false \
            --set pdb.enabled=false \
            --set livenessProbe.httpGet.path=/health \
            --set livenessProbe.httpGet.port=3000 \
            --set livenessProbe.initialDelaySeconds=90 \
            --set readinessProbe.httpGet.path=/health \
            --set readinessProbe.httpGet.port=3000 \
            --set readinessProbe.initialDelaySeconds=60 \
            --set startupProbe.httpGet.path=/health \
            --set startupProbe.httpGet.port=3000 \
            --set startupProbe.failureThreshold=90 \
            --set ingress.enabled=false \
            --wait --timeout 15m
