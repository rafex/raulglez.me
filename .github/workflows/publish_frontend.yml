name: Publish Frontend

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - containers/Dockerfile.frontend
      - containers/nginx-frontend.conf
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set image name
        id: meta
        run: echo "image=ghcr.io/${{ github.repository_owner }}/raulglez-frontend:${{ github.ref_name == 'main' && 'latest' || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.image }}
