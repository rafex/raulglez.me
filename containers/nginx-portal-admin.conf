# Temp paths en /tmp/nginx (corremos como UID 101, no root)
proxy_temp_path /tmp/nginx/proxy_temp;
client_body_temp_path /tmp/nginx/client_temp;
fastcgi_temp_path /tmp/nginx/fastcgi_temp;
uwsgi_temp_path /tmp/nginx/uwsgi_temp;
scgi_temp_path /tmp/nginx/scgi_temp;

server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # API admin — protegida por sesión en backend-portal
    location /api/admin/ {
        proxy_pass http://raulglez-backend-portal:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Endpoints de autenticación (POST) — se proxy al backend
    location = /admin/login {
        proxy_pass http://raulglez-backend-portal:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
    location = /admin/logout {
        proxy_pass http://raulglez-backend-portal:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Admin SPA — archivos copiados a /usr/share/nginx/html/admin/ (base Vite: /admin/)
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # Redirigir raíz al panel admin
    location = / {
        return 301 /admin/;
    }
}
